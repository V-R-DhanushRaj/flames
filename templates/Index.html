<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Datatype:wght@100..900&family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">

    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}">

    <title>Flames</title>
  </head>
  <body>
    <div class="center-content">
      <div>
        <h1>FLAMES</h1>
        <p class="ICM" color="#bbe4ff">Predict the Destiny</p>
      </div>

      <br>
      <div class="inputs">
        <form action="/destiny" method="get" class="center-content">
          <div class="into-row">
            <input type="text" id="Name1" name="name1" placeholder="Enter Name" />
            <img
              src="{{ url_for('static', filename='images/heart-calligraphy-style.png') }}"
              id="heart-img"
              width="3%"
            />
            <input
              type="text"
              id="Name2"
              name="name2"
              placeholder="Enter Name"
            />
          </div>
          <br><br><br>
          <button type="submit" class="DTM">See Destiny</button>
        </form>
      </div>
    </div>
  </body>
</html>
